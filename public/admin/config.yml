backend:
  name: git-gateway
  branch: main

local_backend: true
locale: "pt"
site_url: "/"
logo_url: "/admin/logo.png"

media_folder: "public/uploads"
public_folder: "/uploads"

load_config_file: true
publish_mode: simple

slug:
  clean_accents: true

editor:
  preview: true

display_url: https://stockcapitalmfo.com.br

collections:

  # ==============================
  # PUBLICAÇÕES
  # ==============================

  - name: "cartas"
    label: "Cartas"
    folder: "src/content/cartas"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Título", widget: "string" }
      - { name: "date", label: "Data", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "summary", label: "Resumo", widget: "text", required: false }
      - { name: "pdf", label: "PDF", widget: "file", media_library: { allow_multiple: false }, allow_types: ["pdf"] }

  - name: "relatorios"
    label: "Relatórios"
    folder: "src/content/relatorios"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Título", widget: "string" }
      - { name: "date", label: "Data", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "summary", label: "Resumo", widget: "text", required: false }
      - { name: "pdf", label: "PDF", widget: "file", media_library: { allow_multiple: false }, allow_types: ["pdf"] }

  - name: "insights"
    label: "Insights"
    folder: "src/content/insights"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Título", widget: "string" }
      - { name: "date", label: "Data", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "summary", label: "Resumo", widget: "text", required: false }
      - { name: "pdf", label: "PDF", widget: "file", media_library: { allow_multiple: false }, allow_types: ["pdf"] }

  - name: "compliance"
    label: "Compliance"
    folder: "src/content/compliance"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Título", widget: "string" }
      - { name: "date", label: "Data", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "summary", label: "Resumo", widget: "text", required: false }
      - { name: "pdf", label: "PDF", widget: "file", media_library: { allow_multiple: false }, allow_types: ["pdf"] }

  # ==============================
  # GRÁFICOS - CONFIG
  # ==============================

  - name: "charts_config"
    label: "Gráficos • Configurações"
    format: "json"
    files:

      - name: "mfo_desempenho"
        label: "Gráfico: Desempenho"
        file: "src/content/rentabilidade/charts/mfo-desempenho.json"
        fields:
          - { name: "type", widget: "hidden", default: "desempenho" }
          - { name: "title", label: "Título", widget: "string" }
          - { name: "subtitle", label: "Subtítulo", widget: "string", required: false }
          - { name: "notes", label: "Notas", widget: "text", required: false }
          - { name: "autoplay_seconds", label: "Auto-play", widget: "number", value_type: "int", min: 0, default: 8 }

          - label: "Acumulação"
            name: "accumulation"
            widget: "select"
            options: ["sum", "compound"]
            default: "sum"

          - label: "Séries"
            name: "series"
            widget: "list"
            fields:
              - { name: "label", label: "Rótulo", widget: "string" }
              - { name: "source", label: "Fonte (JSON)", widget: "file", allow_types: ["json"] }
              - { name: "y", label: "Campo Y", widget: "string", default: "rendimento" }

      - name: "volatilidade_ltm"
        label: "Gráfico: Volatilidade"
        file: "src/content/rentabilidade/charts/volatilidade-ltm.json"
        fields:
          - { name: "type", widget: "hidden", default: "volatilidade" }
          - { name: "title", label: "Título", widget: "string" }
          - { name: "source", label: "Fonte (JSON)", widget: "file", allow_types: ["json"] }

      - name: "risco_retorno"
        label: "Gráfico: Risco-Retorno"
        file: "src/content/rentabilidade/charts/risco-retorno.json"
        fields:
          - { name: "type", widget: "hidden", default: "risco-retorno" }
          - { name: "title", label: "Título", widget: "string" }
          - { name: "source", label: "Fonte (JSON)", widget: "file", allow_types: ["json"] }

  # ==============================
  # GRÁFICOS - DADOS
  # ==============================

  - name: "charts_data"
    label: "Gráficos • Dados"
    format: "json"
    files:

      - name: "desempenho_portfolio"
        label: "Dados • Desempenho (Portfólio)"
        file: "src/content/rentabilidade/data/desempenho/mfo-portfolio.json"
        fields:
          - label: "Série"
            name: "series"
            widget: "list"
            fields:
              - { label: "Mês", name: "date", widget: "datetime", format: "YYYY-MM", date_format: "YYYY-MM", time_format: false }
              - { label: "Rendimento (%)", name: "rendimento", widget: "number", value_type: "float" }

      - name: "risco_retorno_sortino_sharpe"
        label: "Dados • Risco-Retorno"
        file: "src/content/rentabilidade/data/risco-retorno/sortino-sharpe.json"
        fields:
          - label: "Série"
            name: "series"
            widget: "list"
            fields:
              - { label: "Mês", name: "date", widget: "datetime", format: "YYYY-MM", date_format: "YYYY-MM", time_format: false }
              - { label: "Sortino", name: "sortino", widget: "number", value_type: "float" }
              - { label: "Sharpe", name: "sharpe", widget: "number", value_type: "float" }

  # ==============================
  # FUNDOS
  # ==============================

  - name: "fundos"
    label: "Fundos"
    folder: "src/content/fundos"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"

    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Categoria (label)", name: "categoria_label", widget: "string", required: false }
      - { label: "Nome do Fundo", name: "nome", widget: "string" }
      - { label: "Símbolo", name: "simbolo", widget: "string" }

      - label: "Topo"
        name: "topo"
        widget: "object"
        fields:
          - { label: "Taxa Administração Destaque", name: "taxa_administracao_destaque", widget: "string", required: false }
          - { label: "Texto Prospecto (abaixo da taxa)", name: "prospecto_label", widget: "string", required: false }

          - label: "Card • Valor da Cota"
            name: "valor_cota"
            widget: "object"
            fields:
              - { label: "Título do card (opcional)", name: "label", widget: "string", required: false }
              - { label: "Data de referência (YYYY-MM-DD)", name: "data_referencia", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
              - { label: "Valor (R$)", name: "valor", widget: "number", value_type: "float", required: false }

          - label: "Card • Variação da Cota"
            name: "variacao_cota"
            widget: "object"
            fields:
              - { label: "Título do card (opcional)", name: "label", widget: "string", required: false }
              - { label: "Data de referência (YYYY-MM-DD)", name: "data_referencia", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
              - { label: "Valor (%)", name: "valor", widget: "number", value_type: "float", required: false }

          - label: "Card • Rendimento Total da Cota"
            name: "rendimento_total_cota"
            widget: "object"
            fields:
              - { label: "Título do card (opcional)", name: "label", widget: "string", required: false }
              - { label: "Data de referência (YYYY-MM-DD)", name: "data_referencia", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
              - { label: "Valor (%)", name: "valor", widget: "number", value_type: "float", required: false }

      - label: "Características-chave"
        name: "caracteristicas_chave"
        widget: "object"
        fields:
          - { label: "Patrimônio líquido do fundo", name: "patrimonio_liquido", widget: "string", required: false }
          - { label: "Bolsa", name: "bolsa", widget: "string", required: false }
          - { label: "Classe de ativos", name: "classe_de_ativos", widget: "string", required: false }
          - { label: "Código CVM", name: "codigo_cvm", widget: "string", required: false }
          - { label: "Domicílio", name: "domicilio", widget: "string", required: false }
          - { label: "Data de constituição", name: "data_constituicao", widget: "string", required: false }
          - { label: "Moeda", name: "moeda", widget: "string", required: false }
          - { label: "Índice de benchmark", name: "benchmark", widget: "string", required: false }

      - label: "Características do portfólio"
        name: "caracteristicas_portfolio"
        widget: "object"
        fields:
          - { label: "Número de ativos na carteira", name: "numero_ativos_carteira", widget: "number", value_type: "int", required: false }
          - { label: "Retorno 12m", name: "retorno_12m", widget: "string", required: false }
          - { label: "Volatilidade", name: "volatilidade", widget: "string", required: false }
          - { label: "Beta (Versus CDI)", name: "beta", widget: "string", required: false }
          - { label: "Sharpe", name: "sharpe", widget: "string", required: false }
          - { label: "Máximo drawdown", name: "maximo_drawdown", widget: "string", required: false }

      - label: "Exposição"
        name: "exposicao"
        widget: "object"
        fields:
          - label: "Itens (Setores)"
            name: "itens"
            widget: "list"
            summary: "{{fields.setor}} — {{fields.percentual}}%"
            fields:
              - { label: "Setor", name: "setor", widget: "string" }
              - { label: "Percentual (%)", name: "percentual", widget: "number", value_type: "float", min: 0, max: 100 }

      - label: "Rentabilidade"
        name: "rentabilidade"
        widget: "object"
        fields:
          - { label: "Formato do mês (texto)", name: "formato_mes", widget: "string", default: "MM/AAAA", required: false }
          - label: "Tabela Mensal"
            name: "tabela_mensal"
            widget: "list"
            summary: "{{fields.mes}} • Fundo: {{fields.fundo}}% • CDI: {{fields.cdi}}%"
            fields:
              - {
                  label: "Mês (MM/AAAA)",
                  name: "mes",
                  widget: "string",
                  pattern: ["^(0[1-9]|1[0-2])\\/(19|20)\\d{2}$", "Use MM/AAAA. Ex: 02/2026"]
                }
              - { label: "Fundo (%)", name: "fundo", widget: "number", value_type: "float" }
              - { label: "CDI (%)", name: "cdi", widget: "number", value_type: "float" }

      - label: "Taxas"
        name: "taxas"
        widget: "list"
        required: false
        fields:
          - { label: "Nome", name: "nome", widget: "string" }
          - { label: "Valor", name: "valor", widget: "string" }

      - label: "Documentos"
        name: "documentos"
        widget: "list"
        fields:
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Data (DD/MM/AAAA)", name: "data", widget: "string", required: false }
          - { label: "PDF", name: "pdf", widget: "file", allow_types: ["pdf"] }
